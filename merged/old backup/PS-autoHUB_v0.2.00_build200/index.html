<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>PS-autoHUB</title>
  <link rel="stylesheet" href="styles/panel.css" />
</head>
<body>
<div id="scroll-wrap">

  <div class="panel-title">PS-autoHUB v0.2.00 / build 200</div>

  <div class="section" id="section-open">
    <div class="section-label">Open</div>

    <div class="row">
      <span class="field-label">Sort</span>
      <select id="sortBy" class="select-field">
        <option value="name_asc">name ↑</option>
        <option value="name_desc">name ↓</option>
        <option value="date_modified">date modified</option>
      </select>
      <label class="toggle-wrap">
        <span class="toggle-label">Subfolders</span>
        <div class="toggle" id="toggleSubfolders" data-on="false"></div>
      </label>
    </div>

    <div class="row">
      <span class="field-label">Folder 1</span>
      <button class="path-btn empty" id="displayFolder1">—</button>
      <button class="btn-folder-action" id="btnFolder1">Browse</button>
    </div>

    <div class="row">
      <span class="field-label">Folder 2</span>
      <button class="path-btn empty" id="displayFolder2">—</button>
      <button class="btn-folder-action" id="btnFolder2">Browse</button>
    </div>

    <div class="row">
      <span class="field-label">Cross order</span>
      <button class="btn-cross" id="btnCrossOrder">1 → 2</button>
    </div>
  </div>

  <div class="color-line"></div>

  <div class="section" id="section-action">
    <div class="section-head">
      <div class="section-label" style="margin-bottom:0;">Action</div>
      <button class="btn-refresh-actions" id="btnRefreshActions">Refresh All Actions</button>
    </div>
    <div id="actionList"></div>
    <button class="btn-add-action" id="btnAddAction">+ action <span id="actionCount">(1/10)</span></button>
  </div>

  <div class="section" id="section-save">
    <div class="section-label">Save</div>

    <div class="row">
      <span class="field-label">Save Copy</span>
      <div class="toggle" id="toggleSaveCopy" data-on="false"></div>
      <span class="field-label" style="margin-left:8px;">Suffix</span>
      <input type="text" class="input-suffix" id="inputSuffix" placeholder="" />
    </div>

    <div class="row">
      <span class="field-label">Folder 1</span>
      <button class="path-btn empty" id="displaySaveFolder1">—</button>
      <button class="btn-folder-action" id="btnSaveFolder1">Browse</button>
    </div>

    <div class="row">
      <span class="field-label">Folder 2</span>
      <button class="path-btn empty" id="displaySaveFolder2">—</button>
      <button class="btn-folder-action" id="btnSaveFolder2">Browse</button>
    </div>
  </div>

  <div class="run-area">
    <button class="btn-cancel" id="btnCancel">Cancel</button>
    <button class="btn-run"    id="btnRun">▶ Run</button>
  </div>

  <div class="log-popup" id="logPopup" style="display:none;">
    <div class="log-header">
      <span class="log-title">LOG</span>
      <div class="log-header-actions">
        <button class="btn-copy-log" id="btnCopyLog">Copy all</button>
        <button class="btn-close-log" id="btnCloseLog">✕</button>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-info">
        <span class="progress-file" id="progressFile">—</span>
        <span class="progress-count" id="progressCount">0 / 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="log-body" id="logBody"></div>

    <div class="log-footer">
      <span class="footer-summary" id="footerSummary">완료 0 · SaveEr 0 · Skipped 0</span>
      <span class="footer-state"   id="footerState">대기 중</span>
    </div>
  </div>

</div>

<div class="alert-backdrop" id="alertBackdrop" style="display:none;">
  <div class="alert-box">
    <div class="alert-title" id="alertTitle">Warning</div>
    <div class="alert-message" id="alertMessage">Message</div>
    <div class="alert-actions">
      <button class="btn-alert-ok" id="btnAlertOk">OK</button>
    </div>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
