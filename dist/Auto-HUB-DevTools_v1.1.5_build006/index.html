<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Auto-HUB</title>
  <link rel="stylesheet" href="styles/panel.css" />
</head>
<body>
  <div class="panel-shell">
    <div id="scroll-wrap">
      <main class="panel-content">
        <div class="panel-top-line" aria-hidden="true"></div>

        <div class="run-area">
          <button class="btn-cancel" id="btnCancel">Cancel</button>
          <button class="btn-test" id="btnTest" type="button">1 test</button>
          <button class="btn-run" id="btnRun">▶ Run</button>
        </div>

        <section class="panel-section section-accordion is-expanded" id="section-action">
          <div class="section-toggle" id="toggleActionSection" role="button" tabindex="0" aria-expanded="true" aria-controls="actionSectionBody">
            <span class="accordion-icon section-accordion-icon" aria-hidden="true"></span>
            <div class="section-label section-label-inline">ACTION</div>
          </div>
          <div class="section-body" id="actionSectionBody">
            <div id="actionList"></div>
            <div class="action-button-row">
              <button class="btn-add-action" id="btnAddAction" type="button">
                <span class="btn-add-action-main">
                  <span class="icon-mask icon-add" aria-hidden="true"></span>
                  <span>Add action</span>
                </span>
                <span id="actionCount">(1/10)</span>
              </button>
              <button class="btn-reset-all" id="btnRefreshActions" type="button">Reset All</button>
            </div>
          </div>
        </section>

        <section class="panel-section section-accordion is-expanded" id="section-open">
          <div class="section-toggle" id="toggleOpenSection" role="button" tabindex="0" aria-expanded="true" aria-controls="openSectionBody">
            <span class="accordion-icon section-accordion-icon" aria-hidden="true"></span>
            <div class="section-label section-label-inline">OPEN</div>
          </div>
          <div class="section-body" id="openSectionBody">

            <div class="sort-control-hidden" aria-hidden="true">
              <select id="sortBy" class="select-field select-field-sort">
                <option value="name_asc">name ↑</option>
                <option value="name_desc">name ↓</option>
                <option value="date_modified">date modified</option>
              </select>
            </div>

            <div class="row row-open-flags">
              <div class="toggle-wrap toggle-wrap-mode" id="sameFolderX2Wrap">
                <input class="toggle" id="toggleSameFolderX2" type="checkbox" />
                <span class="toggle-label">1Folder 2file</span>
              </div>
              <div class="order-wrap" id="orderWrap">
                <button id="btnCrossOrder">1&gt;2</button>
              </div>
              <div class="toggle-wrap" id="subfoldersWrap">
                <input class="toggle" id="toggleSubfolders" type="checkbox" />
                <span class="toggle-label">Subfolders</span>
              </div>
            </div>

            <div class="row row-folder">
              <img class="path-slot-icon path-slot-icon-1" src="assets/icons/folder-slot-1.png" alt="" aria-hidden="true" draggable="false" />
              <button class="path-btn empty" id="displayFolder1">폴더 선택</button>
              <div class="btn-folder-action btn-folder-icon" id="btnFolder1" role="button" tabindex="0" aria-label="폴더 선택">
                <span class="folder-state-icon" aria-hidden="true">
                  <img class="folder-state-image" src="assets/icons/folder-plus.png" alt="" draggable="false" />
                  <span class="folder-state-reset">
                    <span class="folder-state-reset-line folder-state-reset-line-a"></span>
                    <span class="folder-state-reset-line folder-state-reset-line-b"></span>
                  </span>
                </span>
              </div>
            </div>

            <div class="row row-disclosure row-open-disclosure">
              <div class="btn-disclosure" id="btnFolder2Disclosure" role="button" tabindex="0" aria-expanded="false" aria-controls="openFolder2Content">
                <span class="accordion-icon" aria-hidden="true"></span>
                <span class="accordion-label">2Folder each1file</span>
              </div>
              <div class="order-wrap order-wrap-cross" id="orderWrapCross">
                <button id="btnCrossOrderCross">1&gt;2</button>
              </div>
            </div>

            <div class="disclosure-content" id="openFolder2Content" hidden>
              <div class="row row-folder">
                <img class="path-slot-icon path-slot-icon-2" src="assets/icons/folder-slot-2.png" alt="" aria-hidden="true" draggable="false" />
                <button class="path-btn empty" id="displayFolder2">폴더 선택</button>
                <div class="btn-folder-action btn-folder-icon" id="btnFolder2" role="button" tabindex="0" aria-label="폴더 선택">
                  <span class="folder-state-icon" aria-hidden="true">
                    <img class="folder-state-image" src="assets/icons/folder-plus.png" alt="" draggable="false" />
                    <span class="folder-state-reset">
                      <span class="folder-state-reset-line folder-state-reset-line-a"></span>
                      <span class="folder-state-reset-line folder-state-reset-line-b"></span>
                    </span>
                  </span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel-section section-accordion" id="section-save">
          <div class="section-toggle" id="toggleSaveSection" role="button" tabindex="0" aria-expanded="false" aria-controls="saveSectionBody">
            <span class="accordion-icon section-accordion-icon" aria-hidden="true"></span>
            <div class="section-label section-label-inline">SAVE</div>
          </div>
          <div class="section-body" id="saveSectionBody" hidden>

            <div class="row row-save-copy">
              <div class="save-copy-controls">
                <div class="save-copy-inline">
                  <input class="toggle" id="toggleSaveCopy" type="checkbox" />
                  <span class="field-label field-label-inline">Save Copy</span>
                </div>
                <div class="suffix-group">
                  <span class="field-label field-label-inline">Suffix</span>
                  <input type="text" class="input-suffix" id="inputSuffix" placeholder="" />
                </div>
              </div>
            </div>

            <div class="row row-folder">
              <img id="saveFolderSlotIcon1" class="path-slot-icon path-slot-icon-1" src="assets/icons/folder-slot-1.png" alt="" aria-hidden="true" draggable="false" />
              <button class="path-btn empty" id="displaySaveFolder1">폴더 선택</button>
              <div class="btn-folder-action btn-folder-icon" id="btnSaveFolder1" role="button" tabindex="0" aria-label="폴더 선택">
                <span class="folder-state-icon" aria-hidden="true">
                  <img class="folder-state-image" src="assets/icons/folder-plus.png" alt="" draggable="false" />
                  <span class="folder-state-reset">
                    <span class="folder-state-reset-line folder-state-reset-line-a"></span>
                    <span class="folder-state-reset-line folder-state-reset-line-b"></span>
                  </span>
                </span>
              </div>
            </div>

            <div class="row row-disclosure">
              <div class="btn-disclosure" id="btnSaveFolder2Disclosure" role="button" tabindex="0" aria-expanded="false" aria-controls="saveFolder2Content">
                <span class="accordion-icon" aria-hidden="true"></span>
                <span class="accordion-label">Folder 2</span>
              </div>
            </div>

            <div class="disclosure-content" id="saveFolder2Content" hidden>
              <div class="row row-folder">
                <img id="saveFolderSlotIcon2" class="path-slot-icon path-slot-icon-2" src="assets/icons/folder-slot-2.png" alt="" aria-hidden="true" draggable="false" />
                <button class="path-btn empty" id="displaySaveFolder2">폴더 선택</button>
                <div class="btn-folder-action btn-folder-icon" id="btnSaveFolder2" role="button" tabindex="0" aria-label="폴더 선택">
                  <span class="folder-state-icon" aria-hidden="true">
                    <img class="folder-state-image" src="assets/icons/folder-plus.png" alt="" draggable="false" />
                    <span class="folder-state-reset">
                      <span class="folder-state-reset-line folder-state-reset-line-a"></span>
                      <span class="folder-state-reset-line folder-state-reset-line-b"></span>
                    </span>
                  </span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <header class="panel-header">
          <div class="panel-title">Auto-HUB Dev v1.1.5</div>
          <div class="preview-banner" id="previewBanner" style="display:none;">
            Browser Preview Mode · Photoshop API 없이 UI만 미리 확인 중
          </div>
        </header>

        <section class="panel-section panel-section-log" id="section-log">
          <div class="section-head log-header">
            <div class="log-toggle" id="btnToggleLog" role="button" tabindex="0" aria-expanded="false" aria-controls="logContent">
              <span class="accordion-icon" aria-hidden="true"></span>
              <span class="section-label section-label-inline accordion-label">Log</span>
            </div>
            <div class="log-header-actions">
              <label class="debug-level-control" for="debugLevelSelect">
                <span class="debug-level-label">Debug</span>
                <select class="debug-level-select" id="debugLevelSelect">
                  <option value="0">0</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                </select>
              </label>
              <button class="btn-secondary btn-copy-log" id="btnCopyLog" type="button">Copy all</button>
            </div>
          </div>

          <div class="log-content" id="logContent" hidden>
            <div class="log-summary-row">
              <div class="log-summary-stack">
                <span class="log-inline-summary" id="logSummaryInline">완료 0 · SaveEr 0 · Skipped 0</span>
                <span class="log-inline-state" id="logStateInline">대기 중</span>
              </div>
            </div>

            <div class="progress-wrap">
              <div class="progress-info">
                <span class="progress-file" id="progressFile">—</span>
                <span class="progress-count" id="progressCount">0 / 0</span>
              </div>
              <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
              </div>
            </div>

            <div class="log-body" id="logBody"></div>

            <div class="log-footer">
              <span class="footer-summary" id="footerSummary">완료 0 · SaveEr 0 · Skipped 0</span>
              <span class="footer-state" id="footerState">대기 중</span>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="alert-backdrop" id="alertBackdrop" style="display:none;">
    <div class="alert-box">
      <div class="alert-title" id="alertTitle">Warning</div>
      <div class="alert-message" id="alertMessage">Message</div>
      <div class="alert-actions">
        <button class="btn-alert-ok" id="btnAlertOk">닫기</button>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
